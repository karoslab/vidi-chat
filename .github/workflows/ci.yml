name: ci

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - name: Residue check
        run: |
          if grep -rIEnf scripts/residue-denylist.txt . --exclude-dir=.git --exclude=residue-denylist.txt; then
            echo "Personal/internal residue found (see matches above)"; exit 1
          fi
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm ci
      - run: npm test
